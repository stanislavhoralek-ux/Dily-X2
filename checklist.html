<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontrola sestavy X2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #222536;
    --accent: #00e5ff; --accent2: #ff6b35; --text: #e8eaf0;
    --text-muted: #7b8096; --border: #2e3148;
    --success: #00c896; --error: #ff4757;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.3; pointer-events: none; z-index: 0; }
  header { position: relative; z-index: 1; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 12px; }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 0.5px; }
  .separator { width: 1px; height: 24px; background: var(--border); }
  .btn-back { margin-left: auto; font-size: 12px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; letter-spacing: 1px; color: var(--text-muted); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; text-decoration: none; white-space: nowrap; }
  .btn-back:hover { background: rgba(255,255,255,0.05); }
  main { position: relative; z-index: 1; flex: 1; padding: 24px 16px; max-width: 640px; margin: 0 auto; width: 100%; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 10px; }
  .select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; padding: 10px 14px; outline: none; cursor: pointer; }
  .select:focus { border-color: var(--accent); }
  .btn-primary { background: var(--accent); color: #0f1117; border: none; border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; padding: 11px 20px; cursor: pointer; width: 100%; margin-top: 12px; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: transparent; color: var(--error); border: 1px solid var(--error); border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1px; padding: 8px 16px; cursor: pointer; }
  .progress-wrap { background: var(--surface2); border-radius: 8px; height: 8px; margin: 12px 0 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--success); border-radius: 8px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); display: flex; justify-content: space-between; }
  .progress-label .done { color: var(--success); font-weight: 600; }
  .scan-row { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .scan-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 15px; padding: 10px 14px; outline: none; }
  .scan-input:focus { border-color: var(--accent); }
  .btn-cam { background: var(--accent); border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-size: 18px; color: #0f1117; flex-shrink: 0; }
  .btn-ok { background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 10px 16px; cursor: pointer; flex-shrink: 0; }
  .btn-ok:hover { background: rgba(0,229,255,0.1); }
  .scan-status { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 8px; min-height: 16px; }
  .scan-status.ok { color: var(--success); }
  .scan-status.err { color: var(--error); }
  .camera-container { display: none; margin-top: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .camera-container.active { display: block; }
  .camera-header { background: var(--surface2); padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--text-muted); }
  .btn-close-cam { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 0 4px; }
  #video { width: 100%; display: block; max-height: 260px; object-fit: cover; background: #000; }
  #canvas { display: none; }
  .cam-controls { padding: 10px 14px; display: flex; gap: 8px; align-items: center; background: var(--surface2); }
  .btn-capture { flex: 1; background: var(--accent); border: none; border-radius: 8px; color: #0f1117; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; letter-spacing: 1px; padding: 10px; cursor: pointer; }
  .btn-capture:disabled { opacity: 0.4; cursor: not-allowed; }
  #ocrStatus { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .parts-list { display: none; }
  .parts-list.active { display: block; }
  .section-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; padding: 10px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
  .part-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .part-item:last-child { border-bottom: none; }
  .part-item.checked { opacity: 0.5; }
  .part-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 13px; }
  .part-item.checked .part-checkbox { background: var(--success); border-color: var(--success); color: #0f1117; }
  .part-info { flex: 1; min-width: 0; }
  .part-number { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
  .part-item.checked .part-number { text-decoration: line-through; color: var(--text-muted); }
  .part-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .missing-section { display: none; margin-top: 0; }
  .missing-section.active { display: block; }
  .missing-item { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--error); padding: 6px 0; border-bottom: 1px solid var(--border); }
  .missing-item:last-child { border-bottom: none; }
  .all-done { display: none; text-align: center; padding: 24px; color: var(--success); font-family: 'IBM Plex Mono', monospace; font-size: 14px; letter-spacing: 1px; }
  .all-done.active { display: block; }
  .all-done .icon { font-size: 40px; margin-bottom: 10px; }
  .reset-row { display: flex; justify-content: flex-end; margin-top: 12px; }

  /* Detail nalezeného dílu */
  .scan-result { display: none; margin-top: 12px; animation: slideIn 0.25s ease; }
  .scan-result.active { display: block; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .result-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: relative; overflow: hidden; }
  .result-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
  .result-part-number { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; color: var(--accent); letter-spacing: 2px; margin-bottom: 12px; padding-left: 12px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-left: 12px; }
  .result-field { background: var(--surface); border-radius: 6px; padding: 10px 12px; }
  .result-field-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
  .result-field-value { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text); }
  .result-field.highlight .result-field-value { color: var(--accent2); }
</style>
</head>
<body>
<header>
  <div class="logo">X2</div>
  <div class="separator"></div>
  <h1>Kontrola sestavy</h1>
  <a href="index.html" class="btn-back">← Zpět</a>
</header>

<main>
  <div class="card" id="setupCard">
    <span class="label">Vyber sestavu</span>
    <select id="assemblySelect" class="select">
      <option value="">— zvol sestavu —</option>
    </select>
    <button class="btn-primary" id="btnStart" disabled>SPUSTIT KONTROLU</button>
  </div>

  <div class="card" id="scanCard" style="display:none">
    <span class="label">Skenuj nebo zadej číslo dílu</span>
    <div class="scan-row">
      <input type="text" id="scanInput" class="scan-input" placeholder="např. 0P1220" autocomplete="off" />
      <button class="btn-cam" id="btnCamera" title="Kamera">📷</button>
      <button class="btn-ok" id="btnScan">OK</button>
    </div>
    <div class="scan-status" id="scanStatus"></div>
    <div class="scan-result" id="scanResult">
      <div class="result-card">
        <div class="result-part-number" id="srPartNumber"></div>
        <div class="result-grid">
          <div class="result-field">
            <div class="result-field-label">Podsestava</div>
            <div class="result-field-value" id="srPodsestava"></div>
          </div>
          <div class="result-field highlight">
            <div class="result-field-label">Pozice</div>
            <div class="result-field-value" id="srPozice"></div>
          </div>
          <div class="result-field">
            <div class="result-field-label">Množství</div>
            <div class="result-field-value" id="srMnozstvi"></div>
          </div>
          <div class="result-field">
            <div class="result-field-label">Stav</div>
            <div class="result-field-value" id="srStav"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="camera-container" id="cameraContainer">
      <div class="camera-header">
        <span>Namiř na číslo dílu (nad QTY)</span>
        <button class="btn-close-cam" id="btnCloseCamera">✕</button>
      </div>
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="cam-controls">
        <button class="btn-capture" id="btnCapture" disabled>SNÍMAT TEXT</button>
        <span id="ocrStatus"></span>
      </div>
    </div>
    <div style="margin-top:16px">
      <div class="progress-label">
        <span>Postup</span>
        <span><span class="done" id="doneCount">0</span> / <span id="totalCount">0</span> dílů</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    </div>
    <div class="reset-row">
      <button class="btn-danger" id="btnReset">↺ Reset sestavy</button>
    </div>
  </div>

  <div class="parts-list card" id="partsList">
    <div id="partsContent"></div>
    <div class="all-done" id="allDone">
      <div class="icon">✓</div>
      VŠECHNY DÍLY ZKONTROLOVÁNY
    </div>
  </div>

  <div class="card missing-section" id="missingSection">
    <span class="label">Chybějící díly</span>
    <div id="missingList"></div>
  </div>
</main>

});

  const unique = {};
  parts.forEach(p => {
    if (!unique[p.Cislodilu]) unique[p.Cislodilu] = [];
    unique[p.Cislodilu].push(p);
  });
  return unique;
}

// Render
function renderList() {
  const unique = getUniqueParts(currentAssembly);
  const container = document.getElementById('partsContent');
  container.innerHTML = '';

  // Seskup podle podsestavy
  const byPod = {};
  Object.entries(unique).forEach(([c, entries]) => {
    entries.forEach(e => {
      if (!byPod[e.Podsestava]) byPod[e.Podsestava] = [];
      if (!byPod[e.Podsestava].find(x => x.Cislodilu === c)) byPod[e.Podsestava].push(e);
    });
  });

  Object.keys(byPod).sort((a,b) => Number(a)-Number(b)).forEach(pod => {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'Podsestava ' + pod;
    container.appendChild(title);
    byPod[pod].forEach(part => {
      const isChecked = !!checkedParts[part.Cislodilu];
      const item = document.createElement('div');
      item.className = 'part-item' + (isChecked ? ' checked' : '');
      item.dataset.cislodilu = part.Cislodilu;
      item.innerHTML = '<div class="part-checkbox">' + (isChecked ? '✓' : '') + '</div>' +
        '<div class="part-info"><div class="part-number">' + part.Cislodilu + '</div>' +
        '<div class="part-meta">Pozice ' + part.Pozice + ' · ' + part.Mnozstvi + ' ks</div></div>';
      item.querySelector('.part-checkbox').addEventListener('click', () => togglePart(part.Cislodilu));
      container.appendChild(item);
    });
  });
  updateMissing();
}

function togglePart(cislodilu) {
  if (checkedParts[cislodilu]) delete checkedParts[cislodilu];
  else checkedParts[cislodilu] = true;
  saveChecked(currentAssembly, checkedParts);
  document.querySelectorAll('.part-item[data-cislodilu="' + cislodilu + '"]').forEach(el => {
    const ok = !!checkedParts[cislodilu];
    el.classList.toggle('checked', ok);
    el.querySelector('.part-checkbox').textContent = ok ? '✓' : '';
  });
  updateProgress();
  updateMissing();
}

function updateProgress() {
  const unique = getUniqueParts(currentAssembly);
  const total = Object.keys(unique).length;
  const done = Object.keys(checkedParts).length;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressBar').style.width = total > 0 ? Math.round(done/total*100) + '%' : '0%';
  document.getElementById('allDone').classList.toggle('active', done >= total && total > 0);
}

function updateMissing() {
  const unique = getUniqueParts(currentAssembly);
  const missing = Object.keys(unique).filter(c => !checkedParts[c]);
  const section = document.getElementById('missingSection');
  if (missing.length === 0 || missing.length === Object.keys(unique).length) {
    section.classList.remove('active'); return;
  }
  section.classList.add('active');
  document.getElementById('missingList').innerHTML = missing.map(c => '<div class="missing-item">' + c + '</div>').join('');
}

// Skenování
function processScan(value) {
  const q = value.trim().toUpperCase().replace(/\s+/g, '');
  if (!q) return;
  document.getElementById('scanInput').value = '';
  const unique = getUniqueParts(currentAssembly);
  if (unique[q]) {
    const entries = unique[q];
    // Zobraz detail dílu
    document.getElementById('srPartNumber').textContent = q;
    document.getElementById('srPodsestava').textContent = entries.map(e => e.Podsestava).join(', ');
    document.getElementById('srPozice').textContent = entries.map(e => e.Pozice).join(', ');
    document.getElementById('srMnozstvi').textContent = entries[0].Mnozstvi + ' ks';
    document.getElementById('srStav').textContent = checkedParts[q] ? '✓ Odškrtnuto' : 'Nové';
    document.getElementById('srStav').style.color = checkedParts[q] ? 'var(--success)' : 'var(--accent)';
    document.getElementById('scanResult').classList.add('active');
    if (checkedParts[q]) showScanStatus(q + ' — již odškrtnuto', 'ok');
    else { togglePart(q); showScanStatus('\u2713 ' + q + ' od\u0161krtnuto', 'ok'); }
  } else {
    document.getElementById('scanResult').classList.remove('active');
    showScanStatus(q + ' \u2014 nen\u00ed v sestav\u011b ' + currentAssembly, 'err');
  }
}

function showScanStatus(msg, type) {
  const el = document.getElementById('scanStatus');
  el.textContent = msg; el.className = 'scan-status ' + type;
  setTimeout(() => { el.textContent = ''; el.className = 'scan-status'; }, 3000);
}

document.getElementById('btnScan').addEventListener('click', () => processScan(document.getElementById('scanInput').value));
document.getElementById('scanInput').addEventListener('keydown', e => { if (e.key === 'Enter') processScan(document.getElementById('scanInput').value); });

// Reset
document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('Opravdu resetovat kontrolu sestavy ' + currentAssembly + '?')) return;
  checkedParts = {};
  saveChecked(currentAssembly, checkedParts);
  renderList(); updateProgress();
});

// Kamera
let stream = null;
const btnCamera = document.getElementById('btnCamera');
const cameraContainer = document.getElementById('cameraContainer');
const btnCapture = document.getElementById('btnCapture');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ocrStatus = document.getElementById('ocrStatus');

btnCamera.addEventListener('click', async () => {
  cameraContainer.classList.add('active');
  btnCapture.disabled = true; ocrStatus.textContent = '';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
    video.srcObject = stream; await video.play();
    btnCapture.disabled = false; ocrStatus.textContent = 'Připraveno';
  } catch(err) { ocrStatus.textContent = 'Kamera nedostupná'; }
});

document.getElementById('btnCloseCamera').addEventListener('click', stopCamera);

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  cameraContainer.classList.remove('active');
}

btnCapture.addEventListener('click', async () => {
  btnCapture.disabled = true; ocrStatus.textContent = 'Zpracovávám...';
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d'); ctx.drawImage(video, 0, 0);
  const base64 = canvas.toDataURL('image/jpeg', 0.9).split(',')[1];
  try {
    const response = await fetch(VISION_API_URL, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION', maxResults: 1 }] }] })
    });
    const data = await response.json();
    const annotations = data.responses?.[0]?.textAnnotations || [];
    let found = null;

    if (annotations.length > 1) {
      const qtyAnn = annotations.find(a => a.description.toUpperCase() === 'QTY');
      if (qtyAnn) {
        const qtyTop = Math.min(...qtyAnn.boundingPoly.vertices.map(v => v.y || 0));
        const qtyRight = Math.max(...qtyAnn.boundingPoly.vertices.map(v => v.x || 0));
        let bestY = -1, bestCand = null;
        for (const ann of annotations.slice(1)) {
          const annBottom = Math.max(...ann.boundingPoly.vertices.map(v => v.y || 0));
          const annLeft = Math.min(...ann.boundingPoly.vertices.map(v => v.x || 0));
          const desc = ann.description.replace(/\s+/g, '').toUpperCase()
            .replace(/^O(?=[A-Z0-9])/, '0');
          if (annBottom < qtyTop && /^\d/.test(desc) && desc.length >= 4 && annLeft < qtyRight) {
            if (annBottom > bestY) { bestY = annBottom; bestCand = desc; }
          }
        }
        if (bestCand) found = bestCand;
      }
    }
    // Fallback
    if (!found) {
      const rawText = (annotations[0]?.description || '').toUpperCase().replace(/^O(?=[A-Z0-9])/gm, '0');
      const unique = getUniqueParts(currentAssembly);
      for (const c of Object.keys(unique)) {
        if (rawText.includes(c)) { found = c; break; }
      }
    }

    if (found) {
      ocrStatus.textContent = '✓ ' + found;
      stopCamera(); processScan(found);
    } else {
      ocrStatus.textContent = 'Nenalezeno — zadej ručně';
      btnCapture.disabled = false;
    }
  } catch(err) { ocrStatus.textContent = 'Chyba připojení'; btnCapture.disabled = false; }
});
</script>
